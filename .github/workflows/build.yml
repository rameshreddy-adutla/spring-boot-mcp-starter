name: Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore' 
  pull_request:
    branches: [ main ]
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        run: mvn -B verify --no-transfer-progress
